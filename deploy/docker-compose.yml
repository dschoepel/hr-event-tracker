# Production deployment — used on the VPS via deploy.sh
# Tier 1: app only
# Tier 2: app + db
# Tier 3: see deploy/supabase/ for the full Supabase stack
services:
  app:
    image: ghcr.io/dschoepel/hr-event-tracker:latest
    container_name: hr-event-tracker
    restart: unless-stopped
    user: "${PUID:-1001}:${PGID:-1001}"
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - /data/hr-event-tracker/.env.production
    volumes:
      - /data/hr-event-tracker/data:/app/data   # SQLite persistence
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

