# Production deployment — used on the VPS via deploy.sh
# Tier 1: app only
# Tier 2: app + db
# Tier 3: see deploy/supabase/ for the full Supabase stack
services:
  app:
    image: ghcr.io/__GITHUB_USER__/__APP_NAME__:latest
    container_name: __APP_NAME__
    restart: unless-stopped
    expose:
      - "${APP_PORT:-3000}"
    env_file:
      - /data/__APP_NAME__/.env.production
    networks:
      - proxy_net
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${APP_PORT:-3000}/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Tier 2: uncomment for PostgreSQL
  # db:
  #   image: postgres:17-alpine
  #   container_name: __APP_NAME__-db
  #   restart: unless-stopped
  #   env_file:
  #     - /data/__APP_NAME__/.env.production
  #   volumes:
  #     - pg_data:/var/lib/postgresql/data
  #   networks:
  #     - proxy_net

networks:
  proxy_net:
    external: true  # SWAG reverse proxy network

