<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>hr-event-tracker — Maintenance</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff5f5;
      color: #333;
    }
    .card {
      text-align: center;
      padding: 48px 40px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
    }
    h1 { font-size: 1.5rem; margin-bottom: 12px; color: #d32f2f; }
    p { color: #666; line-height: 1.6; margin-bottom: 16px; }
    small { color: #aaa; font-size: 0.8rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>hr-event-tracker</h1>
    <p>We're performing a quick update. The site will be back shortly.</p>
    <p>This page refreshes automatically every 30 seconds.</p>
    <small>If this persists more than a few minutes, please check back later.</small>
  </div>
</body>
</html>
